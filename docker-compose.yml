version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: db
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: flight-route
    ports:
      - "3306:3306"

  couchbase:
    image: couchbase:community
    environment:
      - COUCHBASE_ADMIN_USERNAME=Administrator
      - COUCHBASE_ADMIN_PASSWORD=password
      - COUCHBASE_BUCKETS=flight-cache
    ports:
      - "8091-8094:8091-8094"
      - "11210:11210"